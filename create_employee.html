<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Website - Create Employee</title>

    <link rel="stylesheet" href="create_employee.css">
    <link href="https://fonts.googleapis.com/css?family=Nunito" rel="stylesheet">
</head>

<body>

    <header class="header">
        <img src="./images/keyvalue.png" alt="Keyvalue Logo" class="company-logo">
    </header>

    <main class="main-container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="sidebar-menu">
                        <img src="./images/employee_list_icon.png" alt="Employee List Icon" class="employee-list-icon">
                        <span>Employee List</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <section class="content-section">
            <div class="page-title">
                <h1>Create Employee</h1>
            </div>
            <div class="form-container">
                <form class="employee-form">

                    <div class="form-group">
                        <label for="employeeName">Employee Name</label>
                        <input type="text" id="employeeName" name="employeeName" placeholder="Employee Name" required>
                    </div>

                    <div class="form-group">
                        <label for="employeeID">Employee ID</label>
                        <input type="text" id="employeeID" name="employeeID" placeholder="Employee ID" required>
                    </div>

                    <div class="form-group">
                        <label for="joinDate">Joining Date</label>
                        <input type="text" id="joinDate" name="joinDate" placeholder="Joining Date" required onfocus="this.type='date'; this.showPicker();" onblur="if(!this.value) this.type='text';">
                    </div>

                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" name="role">
                            <option value="" selected disabled>Choose Role</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="" selected disabled>Status</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="experience">Experience</label>
                        <input type="number" id="experience" name="experience" placeholder="Experience">
                    </div>

                    <div class="form-group address-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" placeholder="Address">
                        <div class="address-row">
                            <input type="text" id="city" name="city" placeholder="City">
                            <input type="text" id="country" name="country" placeholder="Country">
                        </div>
                        <input type="text" id="postalCode" name="postalCode" placeholder="Postal code" class="small-field">
                    </div>

                    <div class="form-group">
                        <label for="IDProof">Upload ID Proof</label>
                        <div class="custom-file-upload">
                            <input type="file" id="IDProof" name="IDProof">
                            <label for="IDProof" class="upload-label">
                                <img src="./images/attach_files_vector.png" alt="Attach File Icon">
                                <span>Attach files</span>
                            </label>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="create-btn">Create</button>
                        <button type="button" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
