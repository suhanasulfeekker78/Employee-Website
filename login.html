<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Website - Login</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://fonts.googleapis.com/css?family=Nunito' rel='stylesheet'>
</head>
<body>
    <main>
        <section class="left-main-box">
            <div class="left-inner-box">
                <img src="./images/login_graphics.png" alt="Employees graphics" class="login-graphics">
            </div>
        </section>
        <section class="right-main-box"> 
            <div class="right-inner-box">
                <div>
                    <img src="./images/keyvalue.png" alt="KeyValue Logo" class="company-logo">
                </div>                
                <form>
                    <div>
                        <label for="username" class="username-label">Username</label>
                        <input type="text" id="username" class="input-box" name="username">
                    </div>
                    <div>
                        <input type="password" id="password" name="password" class="input-box" placeholder="Password"><br>
                    </div>
                    <input type="submit" value="Login" class="login-button">
                </form>
            </div>
        </section>
    </main>
</body>
</html>
